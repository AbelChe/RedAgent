  async: false
  risk_level: medium
  requires_approval: false
  capabilities: []
  output: python3
  memory_limit: 1g

# ── 漏洞利用工具（关键风险） ──
msfconsole:
  image: metasploitframework/metasploit-framework:6.4.0
  async: true
  risk_level: critical
  requires_approval: true
  capabilities:
    - NET_RAW
    - NET_ADMIN
  output: msfconsole
  memory_limit: 2g
  cpu_limit: 2.0

msfvenom:
  image: metasploitframework/metasploit-framework:6.4.0
  async: false
  risk_level: critical
  requires_approval: true
  capabilities: []
  output: msfvenom
  memory_limit: 1g

