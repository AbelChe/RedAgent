# 容器镜像映射配置
# 定义工具与容器镜像的对应关系、安全配置及风险分级
#
# risk_level: low / medium / high / critical
#   low      → 只读侦察，自动放行
#   medium   → 可能产生副作用，自动放行但记录日志
#   high     → 密码爆破等高风险操作，需人工审批
#   critical → 漏洞利用/武器化，必须人工审批

# 默认配置（当工具未找到时使用）
default:
  image: parrotsec/security:7.0
  async: false
  risk_level: medium
  requires_approval: false
  capabilities:
    - NET_RAW
  memory_limit: 512m
  cpu_limit: 1.0
  pids_limit: 100

# ── 端口扫描工具（侦察类） ──
nmap:
  image: parrotsec/security:7.0
  async: true
  risk_level: low
  requires_approval: false
  capabilities:
    - NET_RAW
  output: nmap

masscan:
  image: parrotsec/security:7.0
  async: true
  risk_level: low
  requires_approval: false
  capabilities:
    - NET_RAW
  memory_limit: 1g
  output: masscan

# ── 目录爆破工具 ──
gobuster:
  image: parrotsec/security:7.0
  async: true
  risk_level: medium
  requires_approval: false
  capabilities: []
  output: gobuster

dirb:
  image: parrotsec/security:7.0
  async: true
  risk_level: medium
  requires_approval: false
  capabilities: []
  output: dirb

ffuf:
  image: parrotsec/security:7.0
  async: true
  risk_level: medium
  requires_approval: false
  capabilities: []
  output: ffuf

# ── 字典生成工具 ──
crunch:
  image: parrotsec/security:7.0
  async: false
  risk_level: low
  requires_approval: false
  capabilities: []
  output: crunch
  memory_limit: 256m

cewl:
  image: parrotsec/security:7.0
  async: false
  risk_level: low
  requires_approval: false
  capabilities: []
  output: cewl

# ── 口令爆破工具（高风险） ──
hydra:
  image: parrotsec/security:7.0
  async: true
  risk_level: high
  requires_approval: true
  capabilities:
    - NET_RAW
  output: hydra

medusa:
  image: parrotsec/security:7.0
  async: true
  risk_level: high
  requires_approval: true
  capabilities:
    - NET_RAW
  output: medusa

ncrack:
  image: parrotsec/security:7.0
  async: true
  risk_level: high
  requires_approval: true
  capabilities:
    - NET_RAW
  output: ncrack

# ── 数据分析工具 ──
python:
  image: python:3.11-slim
  async: false
  risk_level: medium
  requires_approval: false
  capabilities: []
  output: python
  memory_limit: 1g

python3:
