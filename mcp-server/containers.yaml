# 容器镜像映射配置
# 定义工具与容器镜像的对应关系及安全配置

# 默认配置（当工具未找到时使用）
default:
  image: parrotsec/security:7.0
  async: false  # Default to sync execution
  capabilities:
    - NET_RAW
  memory_limit: 512m
  cpu_limit: 1.0
  pids_limit: 100

# 端口扫描工具
nmap:
  image: parrotsec/security:7.0
  async: true  # Long-running port scanning
  capabilities:
    - NET_RAW

masscan:
  image: parrotsec/security:7.0
  async: true  # Fast port scanning but can be long
  capabilities:
    - NET_RAW
  memory_limit: 1g

# 目录爆破工具
gobuster:
  image: parrotsec/security:7.0
  async: true  # Directory bruteforce
  capabilities: []

dirb:
  image: parrotsec/security:7.0
  async: true  # Directory bruteforce
  capabilities: []

ffuf:
  image: parrotsec/security:7.0
  async: true  # Fuzzing tool
  capabilities: []

# 字典生成工具
crunch:
  image: parrotsec/security:7.0
  async: false  # Fast utility
  capabilities: []
  memory_limit: 256m

cewl:
  image: parrotsec/security:7.0
  async: false  # Web scraping utility
  capabilities: []

# 口令爆破工具
hydra:
  image: parrotsec/security:7.0
  async: true  # Password cracking
  capabilities:
    - NET_RAW

medusa:
  image: parrotsec/security:7.0
  async: true  # Password cracking
  capabilities:
    - NET_RAW

ncrack:
  image: parrotsec/security:7.0
  async: true  # Password cracking
  capabilities:
    - NET_RAW

# 数据分析工具
python:
  image: python:3.11-slim
  async: false  # Script execution
  capabilities: []
  memory_limit: 1g

python3:
  image: python:3.11-slim
  async: false  # Script execution
  capabilities: []
  memory_limit: 1g

# 漏洞利用工具
msfconsole:
  image: metasploitframework/metasploit-framework:latest
  async: true  # Exploitation framework
  capabilities:
    - NET_RAW
    - NET_ADMIN
  memory_limit: 2g
  cpu_limit: 2.0

msfvenom:
  image: metasploitframework/metasploit-framework:latest
  async: false  # Payload generation
  capabilities: []
  memory_limit: 1g

# 信息收集工具
curl:
  image: parrotsec/security:7.0
  async: false  # Quick HTTP request
  capabilities: []

wget:
  image: parrotsec/security:7.0
  async: false  # Quick download
  capabilities: []

whois:
  image: parrotsec/security:7.0
  async: false  # Domain lookup
  capabilities: []

dig:
  image: parrotsec/security:7.0
  async: false  # DNS lookup
  capabilities: []

# Web 漏洞扫描
nikto:
  image: parrotsec/security:7.0
  async: true  # Web vulnerability scanner
  capabilities: []

sqlmap:
  image: parrotsec/security:7.0
  async: true  # SQL injection testing
  capabilities: []

nuclei:
  image: projectdiscovery/nuclei:latest
  async: true  # Vulnerability scanner
  capabilities: []
