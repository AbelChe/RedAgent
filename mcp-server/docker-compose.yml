version: '3.8'

services:
  mcp-server:
    build: .
    container_name: mcp-server-manager
    volumes:
      # CRITICAL: Allow container to control host Docker
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Persist workspace data
      - ./workspace_data:/app/workspace_data
      
      # Map host config (assuming relative path from mcp-server dir)
      - ../backend/app/config/containers.yaml:/app/config/containers.yaml
    environment:
      - CONTAINER_CONFIG_PATH=/app/config/containers.yaml
    # If using stdio, we don't strictly need ports, but if we switch to SSE in future:
    # ports:
    #   - "8000:8000"
    stdin_open: true # Keep stdin open for MCP communication if running interactively
    tty: true
