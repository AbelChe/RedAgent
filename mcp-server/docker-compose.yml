version: '3.8'

services:
  mcp-server:
    image: diudiudiuuuu/redagent-mcp-server:latest
    container_name: mcp-server-${WORKSPACE_ID:-default}
    volumes:
      # Use named volume for workspace data (shared with code-server)
      - workspace-data:/app/workspace_data
      # CRITICAL: Allow MCP to manage Docker containers (for tool execution)
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WORKSPACE_VOLUME_NAME=workspace-data
      - WORKSPACE_ID=${WORKSPACE_ID:-default}
      - MCP_HUB_URL=${MCP_HUB_URL}
      - MCP_TOKEN=${MCP_TOKEN}
    restart: unless-stopped
    networks:
      - workspace-network

  code-server:
    image: codercom/code-server:latest
    container_name: code-server-${WORKSPACE_ID:-default}
    volumes:
      # Share the same workspace volume with mcp-server
      - workspace-data:/home/coder/project
    working_dir: /home/coder/project
    environment:
      - TZ=Etc/UTC
      - PASSWORD=${CODE_SERVER_PASSWORD:-changeme}
    ports:
      - "${CODE_SERVER_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - workspace-network
    command: --auth password --disable-telemetry

# Define named volumes for data persistence
volumes:
  workspace-data:
    driver: local

# Define network for inter-service communication
networks:
  workspace-network:
    driver: bridge

